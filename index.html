<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>U.I.T • Glendale Tactical OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
      font-family: system-ui, -apple-system, sans-serif;
    }
    .glass {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 255, 170, 0.2);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .nav-item {
      transition: all 0.3s;
    }
    .nav-item:hover, .nav-item.active {
      background: rgba(0, 255, 170, 0.15);
      border-left: 4px solid #00ffaa;
    }
    .header-glow {
      background: linear-gradient(to right, #111827, #1e2937);
      box-shadow: 0 4px 20px rgba(0, 255, 170, 0.3);
    }
  </style>
</head>
<body class="text-gray-100 min-h-screen">

<div class="flex h-screen overflow-hidden">

  <!-- SIDEBAR -->
  <div class="w-72 glass flex flex-col border-r border-emerald-900">
    <div class="header-glow p-6 border-b border-emerald-800">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 bg-gradient-to-br from-emerald-400 to-cyan-400 rounded-2xl flex items-center justify-center text-3xl font-black text-black">U</div>
        <div>
          <div class="text-3xl font-black tracking-widest text-emerald-400">U.I.T</div>
          <div class="text-xs text-emerald-500 tracking-widest">ARMÉE GLENDALE</div>
        </div>
      </div>
    </div>

    <div class="flex-1 p-4 space-y-2 overflow-auto">
      <div onclick="showSection('dashboard')" class="nav-item active flex items-center gap-3 px-6 py-4 rounded-2xl cursor-pointer"><i class="fas fa-tachometer-alt"></i> Tableau de Bord</div>
      <div onclick="showSection('verification')" class="nav-item flex items-center gap-3 px-6 py-4 rounded-2xl cursor-pointer"><i class="fas fa-search"></i> Vérification</div>
      <div onclick="showSection('soldats')" class="nav-item flex items-center gap-3 px-6 py-4 rounded-2xl cursor-pointer"><i class="fas fa-users"></i> Soldats & Photos</div>
      <div onclick="showSection('demandes')" class="nav-item flex items-center gap-3 px-6 py-4 rounded-2xl cursor-pointer"><i class="fas fa-file-upload"></i> Demandes Stage</div>
      <div onclick="showSection('rapports')" class="nav-item flex items-center gap-3 px-6 py-4 rounded-2xl cursor-pointer"><i class="fas fa-chart-bar"></i> Rapports</div>
    </div>

    <div class="p-4 border-t border-emerald-900">
      <button onclick="ouvrirAdmin()" class="w-full py-4 glass rounded-3xl text-amber-400 hover:bg-amber-400/10 flex items-center justify-center gap-2">
        <i class="fas fa-shield-alt"></i> ADMINISTRATION
      </button>
    </div>
  </div>

  <!-- CONTENU PRINCIPAL -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Top Bar -->
    <div class="header-glow h-16 flex items-center px-8 border-b border-emerald-900">
      <h1 id="pageTitle" class="text-2xl font-semibold">Tableau de Bord</h1>
      <div class="ml-auto flex items-center gap-4 text-sm">
        <span class="flex items-center gap-2"><i class="fas fa-circle text-emerald-400 animate-pulse"></i> EN LIGNE</span>
      </div>
    </div>

    <!-- Sections -->
    <div class="flex-1 overflow-auto p-8">

      <!-- DASHBOARD -->
      <div id="dashboard" class="section">
        <h2 class="text-4xl font-bold mb-8">Bienvenue dans l'U.I.T Glendale</h2>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
          <div class="glass p-8 rounded-3xl text-center"><div class="text-6xl font-bold text-emerald-400">18</div><div>Soldats</div></div>
          <div class="glass p-8 rounded-3xl text-center"><div class="text-6xl font-bold text-amber-400">5</div><div>Demandes</div></div>
          <div class="glass p-8 rounded-3xl text-center"><div class="text-6xl font-bold text-cyan-400">92%</div><div>Validation</div></div>
          <div class="glass p-8 rounded-3xl text-center"><div class="text-6xl font-bold text-purple-400">27</div><div>Missions</div></div>
        </div>
      </div>

      <!-- VERIFICATION -->
      <div id="verification" class="section hidden">
        <h2 class="text-3xl font-bold mb-6">Vérification Tactique</h2>
        <div class="max-w-lg glass p-10 rounded-3xl">
          <input id="verifNom" placeholder="Nom complet du soldat" class="w-full p-6 bg-zinc-950 border border-emerald-700 rounded-2xl text-lg mb-6">
          <button onclick="verifierSoldat()" class="w-full py-6 bg-emerald-500 hover:bg-emerald-600 rounded-3xl font-bold text-xl">VÉRIFIER</button>
          <div id="verifResult" class="mt-8 min-h-32"></div>
        </div>
      </div>

      <!-- SOLDATS + PHOTOS -->
      <div id="soldats" class="section hidden">
        <h2 class="text-3xl font-bold mb-6">Base de Données Soldats</h2>
        <div class="glass p-8 rounded-3xl mb-10">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input id="photoUrl" placeholder="URL de la photo" class="p-5 bg-zinc-950 border border-emerald-700 rounded-2xl">
            <input id="sNom" placeholder="Nom complet" class="p-5 bg-zinc-950 border border-emerald-700 rounded-2xl">
            <input id="sGrade" placeholder="Grade" class="p-5 bg-zinc-950 border border-emerald-700 rounded-2xl">
            <input id="sMatricule" placeholder="Matricule" class="p-5 bg-zinc-950 border border-emerald-700 rounded-2xl">
          </div>
          <button onclick="ajouterSoldat()" class="mt-6 w-full py-6 bg-gradient-to-r from-emerald-400 to-cyan-400 text-black font-bold rounded-3xl text-lg">➕ AJOUTER SOLDAT AVEC PHOTO</button>
        </div>
        <div id="soldatsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
      </div>

      <!-- DEMANDES -->
      <div id="demandes" class="section hidden">
        <h2 class="text-3xl font-bold mb-6">Demandes de Stage</h2>
        <div id="demandesList" class="space-y-6"></div>
      </div>

      <!-- RAPPORTS -->
      <div id="rapports" class="section hidden">
        <h2 class="text-3xl font-bold mb-6">Rapports Stratégiques</h2>
        <div class="glass p-10 rounded-3xl">
          <button onclick="genererRapport()" class="px-12 py-6 bg-white/10 hover:bg-white/20 rounded-3xl text-lg">📄 Générer Rapport Complet</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// Données persistantes
let soldats = JSON.parse(localStorage.getItem('uitSoldats')) || [];
let demandesStage = JSON.parse(localStorage.getItem('uitDemandes')) || [];

// Navigation
function showSection(sectionId) {
  document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
  document.getElementById(sectionId).classList.remove('hidden');
  document.getElementById('pageTitle').textContent = {
    'dashboard': 'Tableau de Bord',
    'verification': 'Vérification Tactique',
    'soldats': 'Gestion Soldats',
    'demandes': 'Demandes de Stage',
    'rapports': 'Rapports'
  }[sectionId];
}

// Ajouter soldat
function ajouterSoldat() {
  const nom = document.getElementById('sNom').value.trim();
  const grade = document.getElementById('sGrade').value.trim();
  const photo = document.getElementById('photoUrl').value.trim() || 'https://picsum.photos/id/64/400/300';

  if (!nom || !grade) return alert("Nom et grade sont obligatoires");

  soldats.push({ nom, grade, photo });
  localStorage.setItem('uitSoldats', JSON.stringify(soldats));
  afficherSoldats();
  alert("✅ Soldat ajouté avec succès !");
}

// Afficher soldats
function afficherSoldats() {
  const grid = document.getElementById('soldatsGrid');
  grid.innerHTML = '';
  soldats.forEach(s => {
    const div = document.createElement('div');
    div.className = "glass rounded-3xl overflow-hidden";
    div.innerHTML = `
      <img src="${s.photo}" class="w-full h-64 object-cover">
      <div class="p-6">
        <h3 class="font-bold text-xl">${s.nom}</h3>
        <p class="text-emerald-400">${s.grade}</p>
      </div>
    `;
    grid.appendChild(div);
  });
}

// Vérification
function verifierSoldat() {
  const nom = document.getElementById('verifNom').value.trim();
  const result = document.getElementById('verifResult');
  if (nom) {
    result.innerHTML = `<div class="glass p-8 rounded-3xl text-center text-2xl text-emerald-400">✅ ${nom} — Accès Autorisé</div>`;
  } else {
    result.innerHTML = `<div class="text-amber-400 p-8">Veuillez entrer un nom</div>`;
  }
}

// Admin
function ouvrirAdmin() {
  const mdp = prompt("🔐 Mot de passe Administration :");
  if (mdp === "Kassano@10") {
    alert("✅ Accès Autorisé — Commandant");
  } else {
    alert("❌ Accès Refusé");
  }
}

function genererRapport() {
  alert("📄 Rapport officiel généré (prêt à être imprimé)");
}

// Init
afficherSoldats();
showSection('dashboard');
</script>
</body>
</html>
